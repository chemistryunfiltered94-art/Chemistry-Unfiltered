<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>অফলাইন — Chemistry Unfiltered</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: #f8fafc;
      font-family: 'Hind Siliguri', 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card { max-width: 360px; }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed, #0891b2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p { color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🧪</div>
    <h1>ইন্টারনেট সংযোগ নেই</h1>
    <p>এই পেজটা আগে থেকে সেভ করা নেই, তাই অফলাইনে দেখানো যাচ্ছে না। সংযোগ ফিরলে আবার চেষ্টা করো।</p>
    <button onclick="location.reload()">আবার চেষ্টা করো</button>
  </div>
</body>
</html>
